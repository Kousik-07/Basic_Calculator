<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class="">
    <div class="main h-screen w-full bg-gray-800 flex justify-center items-center">
        <div class="h-130 w-xs bg-gray-600 rounded-2xl flex flex-wrap justify-center p-[20px]">
            <div class="display ">
                <input class="h-[90px] w-[280px]  bg-red-300 rounded-xl text-4xl text-right px-3" type="text">
            </div>
                <div class="btn h-[380px] w-full pt-5 ">
                    <div class="row flex justify-around text-3xl mb-4 ">
                       <button id="del" class="bg-gray-700 h-[60px] w-[60px] rounded-full cursor-pointer text-orange-500"><i class="fa-solid fa-delete-left"></i></button>
                        <button class="bg-gray-700 h-[60px] w-[60px] rounded-full cursor-pointer text-orange-500">AC</button>
                        <button class="bg-gray-700 h-[60px] w-[60px] rounded-full cursor-pointer text-orange-500">%</button>
                        <button class="bg-gray-700 h-[60px] w-[60px] rounded-full cursor-pointer text-orange-500">/</button>
                    </div>
                    <div class="row flex justify-around text-3xl mb-4">
                       <button class="bg-gray-400 h-[60px] w-[60px] rounded-full cursor-pointer">7</button>
                        <button class="bg-gray-400 h-[60px] w-[60px] rounded-full cursor-pointer">8</button>
                        <button class="bg-gray-400 h-[60px] w-[60px] rounded-full cursor-pointer">9</button>
                        <button class="bg-gray-700 h-[60px] w-[60px] rounded-full cursor-pointer text-orange-500">X</button>
                    </div>
                    <div class="row flex justify-around text-3xl mb-4">
                       <button class="bg-gray-400 h-[60px] w-[60px] rounded-full cursor-pointer">4</button>
                        <button class="bg-gray-400 h-[60px] w-[60px] rounded-full cursor-pointer">5</button>
                        <button class="bg-gray-400 h-[60px] w-[60px] rounded-full cursor-pointer">6</button>
                        <button class="bg-gray-700 h-[60px] w-[60px] rounded-full cursor-pointer text-orange-500">-</button>
                    </div>
                    <div class="row flex justify-around text-3xl mb-4">
                       <button class="bg-gray-400 h-[60px] w-[60px] rounded-full cursor-pointer">1</button>
                        <button class="bg-gray-400 h-[60px] w-[60px] rounded-full cursor-pointer">2</button>
                        <button class="bg-gray-400 h-[60px] w-[60px] rounded-full cursor-pointer">3</button>
                        <button class="bg-gray-700 h-[60px] w-[60px] rounded-full cursor-pointer text-orange-500">+</button>
                    </div>
                    <div class="row flex justify-around text-3xl mb-4">
                       <button class="bg-gray-400 h-[60px] w-[60px] rounded-full cursor-pointer">00</button>
                        <button class="bg-gray-400 h-[60px] w-[60px] rounded-full cursor-pointer">0</button>
                        <button class="bg-gray-400 h-[60px] w-[60px] rounded-full cursor-pointer">.</button>
                        <button class="bg-gray-700 h-[60px] w-[60px] rounded-full cursor-pointer text-orange-500">=</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="./calculater.js"></script>
</html>
